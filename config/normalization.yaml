# StreamWrangler — Normalization Rules
#
# Applied in order to clean raw channel display names into canonical names.
# All rules are deterministic: same input always produces same output.

# ─────────────────────────────────────────────
# 1. COUNTRY/SOURCE PREFIXES TO STRIP
#    These appear at the start of display names
# ─────────────────────────────────────────────
strip_prefixes:
  - "US: "
  - "US:"
  - "UK: "
  - "UK:"
  - "FR: "
  - "FR:"
  - "DE: "
  - "DE:"
  - "4K: "
  - "4K:"
  - "8K: "
  - "8K:"
  - "VIP: "
  - "VIP:"
  - "PRIME: "
  - "PRIME:"
  - "SLING: "
  - "SLING:"
  - "CITY: "
  - "CITY:"
  - "GO: "
  - "GO:"
  - "RK: "
  - "RK:"
  - "TUBI: "
  - "TUBI:"
  - "USA: "
  - "USA:"
  - "UEFA | "
  - "UEFA  | "
  - "NOW: "
  - "NOW:"

# ─────────────────────────────────────────────
# 2. QUALITY/TECHNICAL SUFFIXES TO STRIP
#    Removed from end of names (case-insensitive)
# ─────────────────────────────────────────────
strip_suffixes:
  - " FHD"
  - " UHD"
  - " 4K"
  - " HD"
  - " SD"
  - " HEVC"
  - " H265"
  - " ᴴᴰ"
  - " ᴿᴬᵂ"
  - " ⁶⁰ᶠᵖˢ"
  - " ⁵⁰ FPS"
  - " ⁶⁰ FPS"
  - " FPS"
  - " ᵁᴴᴰ"
  - " ᴺᴹ"
  - " ◉"
  - " (A)"
  - " (D)"
  - " (H)"
  - " (S)"
  - " (PC)"
  - " (F2)"
  - " & ³⁸⁴⁰ᴾ"

# ─────────────────────────────────────────────
# 3. INLINE NOISE TO REMOVE
#    Substrings removed anywhere in the name
# ─────────────────────────────────────────────
strip_inline:
  - " ³⁸⁴⁰ᴾ"
  - " ⱽᴵᴾ"
  - " ᴾᴿᴱᴹᴵᵁᴹ"
  - " ⁽ᴮᴷ⁾"
  - "ᴿᴬᵂ"
  - "⁶⁰ᶠᵖˢ"
  - " ʰᵉᵛᶜ"

# ─────────────────────────────────────────────
# 4. WORD REPLACEMENTS
#    Applied after prefix/suffix stripping
#    Format: [from, to]
# ─────────────────────────────────────────────
replacements:
  - ["SP⚽RTS", "SPORTS"]       # emoji in BeIN Sports name
  - ["BBC 4 / CBEEBIES", "BBC Four"]
  - ["BBC 3 / CBBC", "BBC Three"]
  - ["BALLY SPORTS KANSAS CITY PLUS", "BALLY SPORTS KC+"]
  - ["BALLY SPORTS KANSAS CITY", "BALLY SPORTS KC"]
  - ["FOX SPORTS KANSAS CITY PL", "FOX SPORTS KC+"]
  - ["FOX SPORTS KANSAS CITY", "FOX SPORTS KC"]
  - ["SKY SPORTS PREMIER LEAGUE", "SKY SPORTS PREMIER LEAGUE"]
  - ["PREMIER LEAGUE", "Premier League"]
  - ["ABC NEWS INTERNATIONAL", "ABC News International"]
  - ["BBC WORLD NEWS", "BBC World News"]

# ─────────────────────────────────────────────
# 5. CHANNEL ALLOW LIST
#    For high-volume groups (US Broadcast, US PPV) only these
#    canonical names are kept — everything else in the group is dropped.
#    This is the primary deduplication mechanism.
#    Format: target_group -> list of allowed canonical name patterns (substring match)
# ─────────────────────────────────────────────
