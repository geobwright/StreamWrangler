# StreamWrangler — Group Filter Configuration
#
# Two rule types:
#   source_group:        exact match against provider group-title
#   source_group_prefix: matches any group-title that starts with this string
#
# Prefix rules are the preferred form — they catch all quality/tier variants
# (ᴴᴰ, ʰᵉᵛᶜ, ᴿᴬᵂ, ⱽᴵᴾ, ᵁᴴᴰ, etc.) without needing separate entries.
# Exact rules are used where a prefix would be too broad.
#
# Exact rules take priority over prefix rules when both could match.
#
# target_group: "_excluded" — never reaches the store (adult, 8K, etc.)
# enabled: false            — rule exists for reference but is inactive

groups:

  # ─────────────────────────────────────────────
  # US BROADCAST
  # ─────────────────────────────────────────────
  - source_group_prefix: "US| FOX"
    target_group: "US Broadcast"
    enabled: true

  - source_group_prefix: "US| CBS"
    target_group: "US Broadcast"
    enabled: true

  - source_group_prefix: "US| ABC"
    target_group: "US Broadcast"
    enabled: true

  - source_group_prefix: "US| CW"
    target_group: "US Broadcast"
    enabled: true

  - source_group: "US| DIREC TV ᴿᴬᵂ ⁶⁰ᶠᵖˢ"
    target_group: "US Broadcast"
    enabled: true
    notes: "NBC KC (KSHB) and select major market NBC/PBS — allow list gates this"

  - source_group_prefix: "US| NBC"
    target_group: "US Broadcast"
    enabled: true
    notes: "Allow list in normalization.yaml gates to KSHB KC + select majors"

  # ─────────────────────────────────────────────
  # US NEWS
  # ─────────────────────────────────────────────
  - source_group_prefix: "US| NEWS"
    target_group: "US News"
    enabled: true

  # ─────────────────────────────────────────────
  # US SPORTS
  # ─────────────────────────────────────────────
