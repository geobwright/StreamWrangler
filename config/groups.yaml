# StreamWrangler — Group Filter Configuration
#
# Each entry maps a source group_title (from the provider M3U) to a target group
# in your curated lineup.
#
# Structure:
#   source_group: "exact group-title string from provider"
#   target_group: "your group name"
#   enabled: true/false  — false = group exists in config but is excluded from output
#   seasonal: true/false — true = only included when seasonal flag is on
#   notes: optional comment
#
# Stream quality preference order (applied by normalizer):
#   FHD > 4K > HD > SD  — "backup", "RAW", "LOW" suffixes are deprioritized

groups:

  # ─────────────────────────────────────────────
  # US BROADCAST — KC Primary + select major markets
  # ─────────────────────────────────────────────
  - source_group: "US| FOX ᴴᴰ/ᴿᴬᵂ ⁶⁰ᶠᵖˢ"
    target_group: "US Broadcast"
    enabled: true

  - source_group: "US| CBS ᴴᴰ/ᴿᴬᵂ ⁶⁰ᶠᵖˢ"
    target_group: "US Broadcast"
    enabled: true

